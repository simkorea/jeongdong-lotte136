<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 | 정동 롯데캐슬 136</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:    #b8965a;
      --navy:    #1a2340;
      --bg:      #f7f4f0;
      --bg2:     #ffffff;
      --border:  #e2ddd6;
      --text:    #1a1816;
      --muted:   #7a736a;
      --green:   #2e9e5e;
      --red:     #c0392b;
      --ease:    cubic-bezier(0.16,1,0.3,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed; inset: 0; background: var(--navy);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #login-screen.hidden { display: none; }
    .login-box {
      background: #fff; padding: 48px 40px; width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .login-logo { font-size: 11px; letter-spacing: 0.4em; color: var(--gold); margin-bottom: 6px; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 32px; }
    .login-box input {
      width: 100%; border: 1px solid var(--border); padding: 12px 16px;
      font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--navy); }
    .login-btn {
      width: 100%; background: var(--navy); color: #fff;
      border: none; padding: 13px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.08em;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: var(--gold); }
    .login-btn:active { transform: scale(0.99); }
    .login-err { font-size: 12px; color: var(--red); margin-top: 10px; display: none; }

    /* ── LAYOUT ── */
    #dashboard { display: none; min-height: 100vh; }
    .adm-header {
      background: var(--navy); padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .adm-header h1 {
      font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.15em;
    }
    .adm-header h1 span { color: var(--gold); }
    .adm-logout {
      background: none; border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7); font-size: 11px; padding: 6px 14px;
      cursor: pointer; font-family: inherit; letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }
    .adm-logout:hover { border-color: #fff; color: #fff; }

    .adm-body { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

    /* ── STATS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 8px; }
    .stat-val { font-size: 32px; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-val.gold { color: var(--gold); }
    .stat-val.green { color: var(--green); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar-search {
      flex: 1; min-width: 200px; max-width: 320px;
      border: 1px solid var(--border); padding: 9px 14px;
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .toolbar-search:focus { border-color: var(--navy); }
    .filter-btn {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 8px 16px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      color: var(--muted);
    }
    .filter-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    .refresh-btn {
      background: var(--gold); border: none; color: #fff;
      padding: 9px 18px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.06em;
      transition: background 0.2s, transform 0.1s;
      margin-left: auto;
    }
    .refresh-btn:hover { background: #a07840; }
    .refresh-btn:active { transform: scale(0.97); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead tr { background: var(--navy); }
    thead th {
      padding: 12px 16px; text-align: left;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.85);
      letter-spacing: 0.12em; white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8f5; }
    tbody td { padding: 13px 16px; font-size: 13px; color: var(--text); vertical-align: middle; }
    .td-num { color: var(--muted); font-size: 11px; }
    .td-name { font-weight: 600; color: var(--navy); }
    .td-phone a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .td-phone a:hover { text-decoration: underline; }
    .td-msg { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .td-date { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 10px; letter-spacing: 0.06em; border-radius: 20px;
    }
    .badge-pending { background: rgba(184,150,90,0.12); color: #8a6e3a; border: 1px solid var(--gold); }
    .badge-done    { background: rgba(46,158,94,0.10);  color: #206e40; border: 1px solid var(--green); }

    .btn-status {
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      border: 1px solid var(--border); background: var(--bg2);
      cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-status:hover { background: var(--navy); border-color: var(--navy); color: #fff; }
    .btn-status.done { color: var(--muted); cursor: default; }
    .btn-status.done:hover { background: var(--bg2); border-color: var(--border); color: var(--muted); }

    /* 상세 펼침 */
    .row-detail { display: none; background: #fdf9f5; }
    .row-detail.open { display: table-row; }
    .detail-inner { padding: 14px 20px 18px 48px; }
    .detail-inner h4 { font-size: 11px; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 8px; }
    .detail-inner p { font-size: 13px; color: var(--text); line-height: 1.75; }

    .empty-msg {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--navy); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .adm-body { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">LOTTE CASTLE 136</p>
    <h2 class="login-title">관리자 로그인</h2>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button class="login-btn" id="login-btn">로그인</button>
    <p class="login-err" id="login-err">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard">
  <header class="adm-header">
    <h1>정동 롯데캐슬 <span>136</span> · 관리자</h1>
    <button class="adm-logout" id="logout-btn">로그아웃</button>
  </header>

  <main class="adm-body">

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">TOTAL</div>
        <div class="stat-val" id="st-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TODAY</div>
        <div class="stat-val gold" id="st-today">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">대기중</div>
        <div class="stat-val" id="st-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">완료</div>
        <div class="stat-val green" id="st-done">—</div>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <input class="toolbar-search" id="search-input" type="search" placeholder="이름 또는 연락처 검색…">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="pending">대기중</button>
      <button class="filter-btn" data-filter="done">완료</button>
      <button class="refresh-btn" id="refresh-btn">↻ 새로고침</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <div class="loading" id="loading-msg">
        <div class="spinner"></div>데이터 불러오는 중…
      </div>
      <table id="data-table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>이름</th>
            <th>연락처</th>
            <th>관심 타입</th>
            <th>투자 목적</th>
            <th>문의 내용</th>
            <th>상태</th>
            <th>등록일시</th>
            <th>처리</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="empty-msg" id="empty-msg" style="display:none;">등록된 신청이 없습니다.</div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ── 설정 ── */
  const ADMIN_PW = 'lotte136!';
  const _sb = supabase.createClient(
    'https://rdiiekxvuljuwtfpazaz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkaWlla3h2dWxqdXd0ZnBhemF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDk4NjIsImV4cCI6MjA5MjI4NTg2Mn0.7moQhd--8MOGHvP4NPFOJ8rNxL7ImXdA-qNr8FIHoI0'
  );

  let allData = [], curFilter = 'all', searchQ = '';

  /* ── 로그인 ── */
  const loginScreen = document.getElementById('login-screen');
  const dashboard   = document.getElementById('dashboard');

  function checkLogin() {
    if (sessionStorage.getItem('adm_auth') === '1') {
      loginScreen.classList.add('hidden');
      dashboard.style.display = 'block';
      loadData();
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function doLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PW) {
      sessionStorage.setItem('adm_auth', '1');
      loginScreen.classList.add('hidden');
      dashboard.style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('adm_auth');
    location.reload();
  });

  /* ── 데이터 로드 ── */
  async function loadData() {
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('data-table').style.display = 'none';
    document.getElementById('empty-msg').style.display = 'none';

    const { data, error } = await _sb
      .from('consultations')
      .select('*')
      .order('created_at', { ascending: false });

    document.getElementById('loading-msg').style.display = 'none';

    if (error) { alert('데이터 로드 실패: ' + error.message); return; }

    allData = data || [];
    updateStats();
    renderTable();
  }

  /* ── 통계 ── */
  function updateStats() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('st-total').textContent   = allData.length;
    document.getElementById('st-today').textContent   = allData.filter(r => r.created_at?.slice(0,10) === today).length;
    document.getElementById('st-pending').textContent = allData.filter(r => r.status === 'pending').length;
    document.getElementById('st-done').textContent    = allData.filter(r => r.status === 'done').length;
  }

  /* ── 렌더 ── */
  function renderTable() {
    let rows = allData;
    if (curFilter === 'pending') rows = rows.filter(r => r.status !== 'done');
    if (curFilter === 'done')    rows = rows.filter(r => r.status === 'done');
    if (searchQ) {
      const q = searchQ.toLowerCase();
      rows = rows.filter(r =>
        (r.name  || '').toLowerCase().includes(q) ||
        (r.phone || '').toLowerCase().includes(q)
      );
    }

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';

    if (rows.length === 0) {
      document.getElementById('empty-msg').style.display = 'block';
      document.getElementById('data-table').style.display = 'none';
      return;
    }

    document.getElementById('data-table').style.display = 'table';
    document.getElementById('empty-msg').style.display = 'none';

    rows.forEach((r, i) => {
      const isDone   = r.status === 'done';
      const dateStr  = r.created_at ? new Date(r.created_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';
      const msgShort = (r.message || '').slice(0, 30) + ((r.message?.length > 30) ? '…' : '');
      const rowId    = `row-${r.id}`;
      const detailId = `detail-${r.id}`;

      /* 메인 행 */
      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.innerHTML = `
        <td class="td-num">${rows.length - i}</td>
        <td class="td-name">${esc(r.name || '—')}</td>
        <td class="td-phone"><a href="tel:${esc(r.phone)}">${esc(r.phone || '—')}</a></td>
        <td>${esc(r.unit_type || '—')}</td>
        <td>${esc(r.purpose   || '—')}</td>
        <td class="td-msg" title="${esc(r.message || '')}">${esc(msgShort || '—')}</td>
        <td>
          <span class="badge ${isDone ? 'badge-done' : 'badge-pending'}">
            ${isDone ? '완료' : '대기중'}
          </span>
        </td>
        <td class="td-date">${dateStr}</td>
        <td>
          <button class="btn-status ${isDone ? 'done' : ''}"
            data-id="${r.id}" data-done="${isDone}">
            ${isDone ? '완료됨' : '완료 처리'}
          </button>
        </td>
      `;
      tr.addEventListener('click', e => {
        if (e.target.closest('.btn-status')) return;
        const det = document.getElementById(detailId);
        det.classList.toggle('open');
      });
      tbody.appendChild(tr);

      /* 상세 행 */
      const trDetail = document.createElement('tr');
      trDetail.id = detailId;
      trDetail.className = 'row-detail';
      trDetail.innerHTML = `
        <td colspan="9">
          <div class="detail-inner">
            <h4>문의 내용</h4>
            <p>${esc(r.message || '없음')}</p>
          </div>
        </td>
      `;
      tbody.appendChild(trDetail);
    });

    /* 완료 처리 버튼 */
    tbody.querySelectorAll('.btn-status:not(.done)').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        btn.textContent = '처리 중…'; btn.disabled = true;
        const { error } = await _sb.from('consultations').update({ status: 'done' }).eq('id', id);
        if (error) { alert('오류: ' + error.message); btn.textContent = '완료 처리'; btn.disabled = false; return; }
        const row = allData.find(r => r.id == id);
        if (row) row.status = 'done';
        updateStats();
        renderTable();
      });
    });
  }

  /* ── 검색 / 필터 ── */
  document.getElementById('search-input').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderTable();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curFilter = btn.dataset.filter;
      renderTable();
    });
  });

  document.getElementById('refresh-btn').addEventListener('click', loadData);

  /* ── 유틸 ── */
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  checkLogin();
</script>
</body>
</html>
